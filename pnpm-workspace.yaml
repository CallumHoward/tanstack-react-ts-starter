allowBuilds:
  esbuild: true
  lefthook: true
  unrs-resolver: true
# Supply-chain safety: don't install any package version published less than
# 7 days ago (value is in minutes). Gives releases time to be vetted/yanked.
minimumReleaseAge: 10080
# The TypeScript 7.0 RC (typescript + its @typescript/* platform binaries) is
# pinned deliberately and is newer than the window above; opt it out so the RC
# can install. Remove once the stable 7.0 release is older than the cutoff.
minimumReleaseAgeExclude:
  - typescript
  - "@typescript/*"
overrides:
  # TS7's `typescript` package drops the classic root JS API that cosmiconfig 9
  # uses to load TS config files (stylelint.config.ts), which breaks `lint:css`.
  # cosmiconfig 10 loads `.ts` configs via Node's native type-stripping and no
  # longer depends on the typescript package, so pull stylelint's cosmiconfig up
  # to the v10 alpha. Drop this once stylelint depends on cosmiconfig >=10.
  # https://github.com/cosmiconfig/cosmiconfig/issues/350
  "stylelint>cosmiconfig": "10.0.0-alpha.0"
