version: 2
updates:
  - package-ecosystem: "npm" # covers pnpm; auto-detects pnpm-lock.yaml
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7 # mirrors pnpm minimumReleaseAge (10080 min = 7 days)
    open-pull-requests-limit: 10
    groups:
      tanstack:
        patterns: ["@tanstack/*"]
      react:
        patterns: ["react", "react-dom"]
      oxc:
        patterns: ["oxlint*", "oxfmt", "eslint-plugin-playwright"]
      types:
        patterns: ["@types/*"]
    ignore:
      - dependency-name: "nitro" # intentionally tracks the v3 beta "latest"
      # @typescript/native-preview (tsgo) ships daily dev builds; bump it by
      # hand rather than churning a PR every release.
      - dependency-name: "@typescript/native-preview"
      # Keep @types/node on the major matching the Node runtime (.nvmrc);
      # bump it by hand when moving to the next Node LTS.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
