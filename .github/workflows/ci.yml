# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so diff-cover can find the merge-base with the PR base branch.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      # Reads the pnpm version from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v6

      # Manual cache (instead of setup-node's built-in cache: pnpm) so we can
      # use restore-keys for warm/partial restores when the lockfile changes.
      - name: Locate pnpm store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Lint
        # lint:ci uses --format=github for inline PR annotations on lint errors.
        run: pnpm lint:ci

      - name: Lint CSS
        run: pnpm lint:css

      - name: Validate config schemas
        # Validates every tracked JSON/YAML file that references a schema against it.
        run: pnpm validate:schemas

      - name: Format check
        run: pnpm format:check

      - name: Fallow
        run: pnpm fallow

      - name: Test
        run: pnpm test:cov

      # Gate coverage of changed lines only -- reads the HEAD lcov report plus
      # the git diff against the base branch (no baseline or second run needed).
      - name: Diff coverage
        run: |
          pipx run diff-cover coverage/lcov.info \
            --compare-branch origin/${{ github.base_ref || 'main' }} \
            --fail-under 80

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # CI runs against the production preview (pnpm serve), reusing the build
      # from the step above rather than rebuilding.
      - name: E2E
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
